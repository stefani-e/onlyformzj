<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💕 mzj专属</title>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:#03010a;font-family:'ZCOOL XiaoWei',serif;overflow:hidden}

/* ── Galaxy canvas ── */
#galaxy-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}
.nebula{position:fixed;border-radius:50%;filter:blur(90px);pointer-events:none;z-index:0;opacity:.15}
.nb1{width:520px;height:420px;background:radial-gradient(#7b2fff,transparent 70%);top:-120px;left:-100px}
.nb2{width:620px;height:520px;background:radial-gradient(#ff2fa0,transparent 70%);bottom:-160px;right:-130px}
.nb3{width:420px;height:360px;background:radial-gradient(#2fa8ff,transparent 70%);top:28%;left:52%}

/* ── Pages ── */
.page{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .7s,transform .7s;z-index:10}
.page.hidden{opacity:0;pointer-events:none;transform:scale(.93) translateY(10px)}

/* ── Card ── */
.card{background:rgba(255,255,255,.065);backdrop-filter:blur(20px);border-radius:28px;padding:38px 52px 44px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.13);max-width:440px;width:92%;position:relative;z-index:2}
.card-emoji{font-size:46px;margin-bottom:4px;display:block;animation:bounce 2.2s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.card-title{font-family:'Ma Shan Zheng',cursive;font-size:32px;color:#f0c4e8;margin-bottom:5px;letter-spacing:4px;text-shadow:0 0 20px rgba(200,100,255,.5)}
.card-sub{font-size:13px;color:rgba(220,180,255,.65);margin-bottom:14px;letter-spacing:2px}
.gif-wrap{margin:0 auto 18px;width:112px;height:112px;border-radius:50%;overflow:hidden;border:2.5px solid rgba(180,100,255,.5);box-shadow:0 0 20px rgba(160,80,255,.35);background:#1a0a2e;display:flex;align-items:center;justify-content:center}
.gif-wrap img{width:100%;height:100%;object-fit:cover;display:block}

/* ── Buttons ── */
.btn-group{display:flex;gap:11px;justify-content:center;align-items:center;flex-wrap:wrap;min-height:62px}
.btn{padding:12px 26px;border:none;border-radius:50px;font-family:'Ma Shan Zheng',cursive;font-size:19px;cursor:pointer;letter-spacing:2px;user-select:none;transition:transform .3s cubic-bezier(.34,1.56,.64,1),box-shadow .3s,font-size .4s,padding .4s,opacity .4s}
.btn-hx{background:linear-gradient(135deg,#a855f7,#6366f1);color:#fff;box-shadow:0 6px 20px rgba(138,77,255,.45)}
.btn-hx:hover{transform:scale(1.08) translateY(-3px)}
.btn-xh{background:rgba(255,255,255,.1);color:#d8b4fe;border:1px solid rgba(180,100,255,.35)}
.btn-xh:hover{transform:scale(1.06) translateY(-2px)}
.btn-bx{background:rgba(255,255,255,.06);color:rgba(200,180,220,.6);border:1px solid rgba(255,255,255,.1)}
.btn-bx:hover{transform:scale(1.06) translateY(-2px)}
.btn-laopo{background:linear-gradient(135deg,#a855f7,#6366f1);color:#fff;box-shadow:0 6px 20px rgba(138,77,255,.45)}
.btn-laopo:hover{transform:scale(1.07) translateY(-3px)}
.btn-baobao{background:rgba(255,255,255,.1);color:#d8b4fe;border:1px solid rgba(180,100,255,.35)}
.btn-baobao:hover{transform:scale(1.07) translateY(-3px)}
#react-msg{font-family:'Ma Shan Zheng',cursive;font-size:17px;color:#e879f9;min-height:26px;margin-top:12px;transition:opacity .3s;text-shadow:0 0 10px rgba(232,121,249,.5)}

/* ── Floating hearts ── */
.float-heart{position:fixed;pointer-events:none;animation:floatUp 3s ease-in forwards;z-index:25}
@keyframes floatUp{0%{transform:translateY(0) scale(.5);opacity:1}100%{transform:translateY(-85vh) scale(1.4);opacity:0}}

#page-final{background:#03010a;z-index:20;overflow:hidden}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
#ily-canvas{position:absolute;inset:0;z-index:2;pointer-events:none}
.ily-float-bg{position:absolute;inset:0;z-index:1;overflow:visible;pointer-events:none}
.ily-word{
  position:absolute;bottom:-80px;
  font-family:'Ma Shan Zheng',cursive;
  white-space:nowrap;
  opacity:0;
  animation:wordFloat linear infinite;
}
@keyframes wordFloat{
  0%   {opacity:0;  transform:translateY(0)       rotate(var(--r))}
  10%  {opacity:1}
  85%  {opacity:.8}
  100% {opacity:0;  transform:translateY(-120vh)   rotate(var(--r))}
}
.center-love{
  position:relative;z-index:5;
  text-align:center;
  animation:fadeUp .9s ease .5s forwards;opacity:0;
}
.center-love-big{
  font-family:'Ma Shan Zheng',cursive;
  font-size:72px;letter-spacing:10px;
  display:block;line-height:1;
  color:#fff;
  text-shadow:0 0 30px rgba(236,72,153,1),0 0 70px rgba(168,85,247,.8),0 0 120px rgba(99,102,241,.5);
}
.center-love-small{
  font-size:13px;color:rgba(220,180,255,.55);
  letter-spacing:5px;margin-top:14px;display:block;
}
</style>
</head>
<body>

<canvas id="galaxy-canvas"></canvas>
<div class="nebula nb1"></div>
<div class="nebula nb2"></div>
<div class="nebula nb3"></div>

<div class="page" id="page1">
  <div class="card">
    <span class="card-emoji">🐾</span>
    <div class="card-title">你喜欢我吗？</div>
    <div class="card-sub">认真回答哦 ～</div>
    <div class="gif-wrap">
      <img id="main-gif" src="" alt="Love GIF"/>
    </div>
    <div class="btn-group">
      <button class="btn btn-xh" id="btn-xh" onclick="react('xh')">喜欢</button>
      <button class="btn btn-hx" onclick="react('hx')">非常喜欢</button>
      <button class="btn btn-bx" id="btn-bx" onclick="react('bx')">不喜欢</button>
    </div>
    <div id="react-msg"></div>
  </div>
</div>

<div class="page hidden" id="page2">
  <div class="card">
    <span class="card-emoji">🌙</span>
    <div class="card-title">我是你的谁？</div>
    <div class="card-sub">请选一个答案哦 ～</div>
    <div class="btn-group">
      <button class="btn btn-baobao" id="btn-baobao" onclick="clickBaobao()">宝宝</button>
      <button class="btn btn-laopo" id="btn-laopo" onclick="clickLaopo()">老婆</button>
    </div>
  </div>
</div>

<div class="page hidden" id="page-heart">
  <canvas id="heart-canvas3" style="position:absolute;inset:0;z-index:1"></canvas>
</div>

<div class="page hidden" id="page-final">
  <div class="ily-float-bg" id="ily-float-bg"></div>
  <div class="center-love">
    <span class="center-love-big">我爱你</span>
    <span class="center-love-small">in every language &nbsp;·&nbsp; forever &amp; always</span>
  </div>
</div>

<script>
/* ── GIF Fix: Force load with timestamp ── */
window.onload = function() {
  const gif = document.getElementById('main-gif');
  // Adding ?t= forces the browser to refresh the file from your folder
  gif.src = "iloveu.gif?t=" + new Date().getTime();
};

/* ════════════ GALAXY BACKGROUND ════════════ */
const gCanvas = document.getElementById('galaxy-canvas');
const gCtx    = gCanvas.getContext('2d');
let GW, GH, gStars=[], gShoot=[];
function gResize(){ GW=gCanvas.width=innerWidth; GH=gCanvas.height=innerHeight; }
gResize(); addEventListener('resize',()=>{gResize();gInitStars();});
function gInitStars(){
  gStars=[];
  for(let i=0;i<Math.floor(GW*GH/2200);i++)
    gStars.push({x:Math.random()*GW,y:Math.random()*GH,r:.2+Math.random()*1.4,tw:Math.random()*6.28,da:(Math.random()-.5)*.006});
}
gInitStars();
function gDraw(){
  gCtx.clearRect(0,0,GW,GH);
  gStars.forEach(s=>{
    s.tw+=s.da;
    gCtx.beginPath();gCtx.arc(s.x,s.y,s.r,0,6.28);
    gCtx.fillStyle=`rgba(255,255,255,${.35+.55*Math.abs(Math.sin(s.tw))})`;gCtx.fill();
  });
  if(Math.random()<.012) gShoot.push({x:Math.random()*GW*.6,y:Math.random()*GH*.4,len:90+Math.random()*120,sp:6+Math.random()*5,ang:.63+(Math.random()-.5)*.3,life:1});
  gShoot=gShoot.filter(s=>{
    s.x+=Math.cos(s.ang)*s.sp;s.y+=Math.sin(s.ang)*s.sp;s.life-=.026;
    if(s.life<=0)return false;
    const g2=gCtx.createLinearGradient(s.x,s.y,s.x-Math.cos(s.ang)*s.len,s.y-Math.sin(s.ang)*s.len);
    g2.addColorStop(0,`rgba(255,255,255,${s.life*.85})`);g2.addColorStop(1,'transparent');
    gCtx.beginPath();gCtx.moveTo(s.x,s.y);gCtx.lineTo(s.x-Math.cos(s.ang)*s.len,s.y-Math.sin(s.ang)*s.len);
    gCtx.strokeStyle=g2;gCtx.lineWidth=1.5;gCtx.stroke();return true;
  });
  requestAnimationFrame(gDraw);
}
gDraw();

/* ════════════ PAGE 1 ════════════ */
const rxMsgs={
  xh:['再想想～差一点哦 😏','不够哦，重选！💜','还差一点点啦～'],
  bx:['哼！骗人！重新选 😤','不行不行！再想想！😠','你确定吗！？😡']
};
let rxN=0;
function react(type){
  if(type==='hx'){ showPage('page1','page2'); return; }
  const msg=document.getElementById('react-msg');
  msg.style.opacity=0;
  setTimeout(()=>{msg.textContent=rxMsgs[type][rxN%3];rxN++;msg.style.opacity=1;},150);
  const b=document.getElementById(type==='xh'?'btn-xh':'btn-bx');
  b.style.transform='scale(.84) rotate(-5deg)';
  setTimeout(()=>{b.style.transform='';},320);
}

/* ════════════ PAGE 2 ════════════ */
let lScale=1,cCount=0;
function clickBaobao(){
  cCount++;
  const l=document.getElementById('btn-laopo'),b=document.getElementById('btn-baobao');
  lScale+=.28;
  l.style.fontSize=(19*lScale)+'px';
  l.style.padding=(12*Math.min(lScale,1.6))+'px '+(26*Math.min(lScale,2.2))+'px';
  l.style.boxShadow=`0 ${8*lScale}px ${20*lScale}px rgba(138,77,255,.55)`;
  const bs=Math.max(.6,1-cCount*.08);
  b.style.fontSize=(19*bs)+'px';
  b.style.opacity=Math.max(.25,1-cCount*.13);
}
function clickLaopo(){
  showPage('page2','page-heart');
  spawnHearts();
  initBeatingHeart();
  setTimeout(()=>{
    showPage('page-heart','page-final');
    initILYWorld();
  }, 4500);
}

/* ════════════ PAGE 3 – BEATING HEART ════════════ */
function initBeatingHeart(){
  const hc  = document.getElementById('heart-canvas3');
  hc.width  = innerWidth; hc.height = innerHeight;
  const ctx = hc.getContext('2d');
  const cx  = hc.width/2, cy = hc.height/2+10;
  const SC  = Math.min(hc.width,hc.height)*0.037;

  function px(t){ return 16*Math.pow(Math.sin(t),3)*SC; }
  function py(t){ return -(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))*SC; }

  const BSAMP=400;
  const bnd=Array.from({length:BSAMP},(_,i)=>{const t=(i/BSAMP)*6.28;return{x:px(t),y:py(t)};});

  const STEP=4.5, pts=[];
  for(let gx=-SC*17;gx<=SC*17;gx+=STEP){
    for(let gy=-SC*14;gy<=SC*14;gy+=STEP){
      let c=0;
      for(let i=0;i<BSAMP;i++){
        const a=bnd[i],b=bnd[(i+1)%BSAMP];
        if((a.y>gy)!==(b.y>gy)){const xi=a.x+(gy-a.y)*(b.x-a.x)/(b.y-a.y);if(gx<xi)c++;}
      }
      if(c%2===1) pts.push([gx,gy]);
    }
  }

  const P=pts.map(([ox,oy])=>({
    ox,oy,
    x:cx+(Math.random()-.5)*hc.width*.9,
    y:cy+(Math.random()-.5)*hc.height*.9,
    vx:0,vy:0,
    r:.9+Math.random()*1.6,
    hue:290+Math.random()*100,
    lit:55+Math.random()*30,
    phase:Math.random()*6.28,
    spd:.018+Math.random()*0.014,
  }));

  let f=0,bp=0,settled=false,raf;
  function draw(){
    ctx.fillStyle='rgba(3,1,10,0.18)'; ctx.fillRect(0,0,hc.width,hc.height);
    f++; if(f>160) settled=true;
    bp+=0.024;
    const beat=settled?1+0.16*Math.pow(Math.sin(bp),2)*Math.sin(bp+Math.PI*.5):1;
    const ease=settled?.082:.042;
    P.forEach(p=>{
      p.phase+=p.spd;
      const sc2=beat*(1+.06*Math.sin(p.phase));
      const tx=cx+p.ox*sc2,ty=cy+p.oy*sc2;
      p.vx=p.vx*.8+(tx-p.x)*ease; p.vy=p.vy*.8+(ty-p.y)*ease;
      p.x+=p.vx; p.y+=p.vy;
      const tw=.65+.35*Math.abs(Math.sin(p.phase*2.5));
      ctx.shadowBlur=settled?9+5*Math.sin(bp):5;
      ctx.shadowColor=`hsla(${p.hue},100%,80%,.75)`;
      ctx.beginPath(); ctx.arc(p.x,p.y,Math.max(.1,p.r*tw),0,6.28);
      ctx.fillStyle=`hsla(${p.hue},100%,${p.lit}%,${.7+.3*tw})`; ctx.fill();
    });
    ctx.shadowBlur=0;
    raf=requestAnimationFrame(draw);
  }
  draw();
  setTimeout(()=>cancelAnimationFrame(raf),5200);
}

/* ════════════ PAGE 4 – I LOVE YOU WORLD ════════════ */
const ILY_WORDS = [
  {t:'我爱你',            hue:320}, {t:'I love you',      hue:270},
  {t:'愛してる',           hue:200}, {t:'사랑해',            hue:340},
  {t:'Je t\'aime',       hue:260}, {t:'Te amo',           hue:15},
  {t:'Ti amo',           hue:350}, {t:'Eu te amo',        hue:300},
  {t:'Ich liebe dich',   hue:210}, {t:'أحبك',             hue:45},
  {t:'Я люблю тебя',     hue:230}, {t:'मैं तुमसे प्यार', hue:30},
  {t:'ฉันรักคุณ',        hue:160}, {t:'Anh yêu em',       hue:190},
  {t:'Aku cintamu',      hue:270}, {t:'Σε αγαπώ',         hue:330},
  {t:'Seni seviyorum',   hue:50},  {t:'Kocham cię',       hue:310},
  {t:'Ik hou van jou',   hue:180}, {t:'Mahal kita',       hue:120},
  {t:'我愛你',            hue:355}, {t:'Ngiyakuthanda',    hue:140},
];

function initILYWorld(){
  const bg = document.getElementById('ily-float-bg');
  bg.innerHTML = '';

  const total = 55;
  for(let i = 0; i < total; i++){
    const item  = ILY_WORDS[i % ILY_WORDS.length];
    const el    = document.createElement('div');
    el.className = 'ily-word';
    el.textContent = item.t;

    const size  = 15 + Math.random()*28;
    const dur   = 7  + Math.random()*9;
    const delay = i < 36
      ? -(Math.random() * dur * 0.85)
      : -(Math.random() * 2);
    const rot   = (Math.random() - .5) * 35;
    const left  = Math.random() * 98;
    const hue   = item.hue;
    const lit   = 72 + Math.random() * 20;
    const sat   = 85 + Math.random() * 15;

    el.style.left              = left + 'vw';
    el.style.fontSize          = size + 'px';
    el.style.setProperty('--r', rot + 'deg');
    el.style.animationDuration = dur + 's';
    el.style.animationDelay    = delay + 's';
    el.style.color             = `hsl(${hue}, ${sat}%, ${lit}%)`;
    el.style.textShadow        = `0 0 12px hsla(${hue},100%,75%,0.7)`;

    bg.appendChild(el);
  }
}

/* ════════════ HELPERS ════════════ */
function showPage(from,to){
  document.getElementById(from).classList.add('hidden');
  setTimeout(()=>document.getElementById(to).classList.remove('hidden'),380);
}
function spawnHearts(){
  const em=['❤️','💜','💖','🌟','💫','✨','🥰','💝'];
  let n=0;
  const iv=setInterval(()=>{
    for(let i=0;i<3;i++){
      const h=document.createElement('div');h.className='float-heart';
      h.textContent=em[Math.floor(Math.random()*em.length)];
      h.style.cssText=`left:${5+Math.random()*90}vw;bottom:-40px;font-size:${18+Math.random()*26}px;animation-duration:${2.5+Math.random()*2}s;animation-delay:${Math.random()*.4}s`;
      document.body.appendChild(h);setTimeout(()=>h.remove(),5000);
    }
    if(++n>16)clearInterval(iv);
  },360);
}
</script>
</body>
</html>
